{% extends "admin/base.html" %}

{% block title %}分类管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">分类管理</h1>
    <a href="{{ url_for('admin.create_category') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-plus-lg"></i> 新建分类
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>分类名称</th>
                        <th>描述</th>
                        <th>排序</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>{{ cat.category_id }}</td>
                        <td>{{ cat.category_name }}</td>
                        <td>{{ cat.description or '-' }}</td>
                        <td>{{ cat.sort_order }}</td>
                        <td>
                            <a href="{{ url_for('admin.edit_category', category_id=cat.category_id) }}" class="btn btn-primary btn-sm">编辑</a>
                            <form action="{{ url_for('admin.delete_category', category_id=cat.category_id) }}" method="post" class="d-inline" data-confirm='确定删除分类 "{{ cat.category_name }}" 吗？' data-prevent-double-submit>
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <button type="submit" class="btn btn-danger btn-sm">删除</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">暂无分类数据</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
