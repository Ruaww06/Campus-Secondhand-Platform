{% extends "admin/base.html" %}

{% block title %}{{ '编辑分类' if category else '新建分类' }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{{ '编辑分类' if category else '新建分类' }}</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="category_name" class="form-label">分类名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="category_name" name="category_name"
                               value="{{ category.category_name if category else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ category.description if category else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="sort_order" class="form-label">排序</label>
                        <input type="number" class="form-control" id="sort_order" name="sort_order"
                               value="{{ category.sort_order if category else 0 }}" min="0">
                        <div class="form-text">数字越小排序越靠前</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{{ url_for('admin.categories') }}" class="btn btn-outline-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
